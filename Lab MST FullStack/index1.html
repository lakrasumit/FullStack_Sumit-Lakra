  <body>
    <p id="para">Hello World</p>

    <button onclick="changeText()">Click Me</button>

    <script>
      function changeText() {
        let p = document.getElementById("para");

        p.textContent = "Welcome to JavaScript DOM Manipulation";
        p.style.color = "blue";
        p.style.fontSize = "24px";
      }
    </script>
  </body>
</html>
